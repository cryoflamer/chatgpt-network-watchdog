<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ChatGPT Network Watchdog</title>
    <style>
      body {
        min-width: 280px;
        margin: 0;
        padding: 12px;
        font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 10px;
        margin: 0 0 12px;
      }

      dt {
        color: #9ca3af;
      }

      dd {
        margin: 0;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .status {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 700;
      }

      .status-idle { background: #374151; }
      .status-generating { background: #854d0e; }
      .status-reloading { background: #1d4ed8; }
      .status-done { background: #166534; }
      .status-frozen { background: #5b21b6; }
      .status-error { background: #991b1b; }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        background: #f9fafb;
        color: #111827;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: .55;
      }

      button + button {
        margin-top: 8px;
      }

      button.secondary {
        background: #374151;
        color: #f9fafb;
      }

      .setting {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: #d1d5db;
        font-size: 12px;
      }

      .setting input {
        margin: 0;
      }

      .hint {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 12px;
      }

      .tabs {
        border-top: 1px solid #374151;
        margin-top: 12px;
        padding-top: 10px;
      }

      .tabs h2 {
        margin: 0 0 8px;
        font-size: 12px;
        color: #d1d5db;
      }

      .tab-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tab-card {
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 8px;
        background: #1f2937;
      }

      .tab-card.active {
        border-color: #6b7280;
      }

      .tab-title {
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-meta {
        margin-top: 4px;
        color: #9ca3af;
        font-size: 11px;
      }

      .tab-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-top: 8px;
      }

      .tab-actions button {
        padding: 6px 8px;
        font-size: 12px;
      }

      .events {
        border-top: 1px solid #374151;
        margin-top: 12px;
        padding-top: 10px;
      }

      .events h2 {
        margin: 0 0 8px;
        font-size: 12px;
        color: #d1d5db;
      }

      .event-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .event-item {
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 6px 8px;
        background: #1f2937;
      }

      .event-main {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }

      .event-type {
        font-weight: 700;
      }

      .event-age {
        color: #9ca3af;
        white-space: nowrap;
      }

      .event-detail {
        margin-top: 3px;
        color: #9ca3af;
        font-size: 11px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPT Network Watchdog</h1>
    <dl>
      <dt>Status</dt><dd><span id="status" class="status status-idle">IDLE</span></dd>
      <dt>Network</dt><dd id="network">unknown</dd>
      <dt>Page</dt><dd id="page">unknown</dd>
      <dt>Duration</dt><dd id="duration">n/a</dd>
      <dt>Done</dt><dd id="done">never</dd>
      <dt>Error</dt><dd id="error">none</dd>
      <dt>Last</dt><dd id="last">n/a</dd>
    </dl>
    <button id="openFreshChat" type="button">Open current chat in fresh tab</button>
    <button id="reloadTab" class="secondary" type="button" disabled>Reload tab</button>
    <label class="setting">
      <input id="autoRecoverFrozenTabs" type="checkbox">
      Auto-recover frozen tabs
    </label>
    <div id="hint" class="hint">State is tracked by the background service worker. Hotkey: Alt+Shift+N opens the current chat in a fresh tab.</div>
    <section class="tabs">
      <h2>ChatGPT tabs</h2>
      <div id="tabsList" class="tab-list">No ChatGPT tabs detected.</div>
    </section>
    <section class="events">
      <h2>Recent events</h2>
      <div id="eventList" class="event-list">No events yet.</div>
    </section>
    <script src="src/popup.js"></script>
  </body>
</html>
